baseURL = 'https://Yodasama.github.io/'
locale = 'zh-cn'
title = 'Yida Blog'
theme = 'anatole'
summarylength = 20
enableEmoji = true
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  title = "Yodasama"
  author = "Yida"
  description = "记录技术、研究和日常思考"
  profilePicture = "images/panda.JPG"
  mainSections = ["posts"]
  customCss = ["css/custom.css"]
  customJs = ["js/search.js"]
  indexDateFormat = "2006-01-02"
  listDateFormat = "2006-01-02"
  singleDateFormat = "2006-01-02"
  disableTitleCapitalization = true
  reversepagetitle = true

[[params.socialIcons]]
  icon = "fa-brands fa-github"
  title = "GitHub"
  url = "https://github.com/Yodasama"

[[params.socialIcons]]
  icon = "fa-solid fa-envelope"
  title = "Email"
  url = "mailto:yidaaa2269@163.com"

[[menu.main]]
  name = "Home"
  identifier = "home"
  weight = 100
  url = "/"

[[menu.main]]
  name = "Posts"
  identifier = "posts"
  weight = 200
  url = "/posts/"

[[menu.main]]
  name = "About"
  identifier = "about"
  weight = 300
  url = "/about/"

[taxonomies]
  tag = "tags"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
